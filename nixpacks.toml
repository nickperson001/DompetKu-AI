[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "ttf-dejavu"
]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
cmds = []

[start]
cmd = "node index.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXEC_PATH = "/run/current-system/sw/bin/chromium"