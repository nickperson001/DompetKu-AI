<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DompetKu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm glass p-10 rounded-[40px] shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-green-500 tracking-tighter">DompetKu</h1>
            <p class="text-slate-400 text-xs mt-2 uppercase tracking-widest font-bold">Secure Access</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <input type="text" id="username" placeholder="Username" required 
                class="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition">
            <input type="password" id="password" placeholder="Password" required 
                class="w-full bg-slate-800/50 border border-slate-700 p-4 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition">
            
            <button type="submit" id="btn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-green-900/30">
                Masuk ke Dashboard
            </button>
            <p id="err" class="hidden text-red-400 text-[10px] text-center font-bold">USERNAME ATAU PASSWORD SALAH</p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.success) window.location.href = '/';
            else document.getElementById('err').classList.remove('hidden');
        };
    </script>
</body>
</html>
