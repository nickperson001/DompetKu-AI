<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DompetKu HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #logArea::-webkit-scrollbar { width: 4px; }
        #logArea::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <aside id="sidebar" class="hidden md:flex flex-col w-64 glass p-6 fixed h-full z-40 transition-all">
        <div class="mb-10">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">DompetKu</h1>
            <p class="text-[10px] tracking-widest text-slate-500 uppercase font-bold">Admin HQ</p>
        </div>
        
        <nav class="space-y-3 flex-1">
            <button onclick="switchTab('overview')" id="btn-overview" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl bg-slate-800 text-white">
                <i data-lucide="layout-dashboard" class="w-5"></i> Overview
            </button>
            <button onclick="switchTab('users')" id="btn-users" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i data-lucide="database" class="w-5"></i> Database
            </button>
            <button onclick="switchTab('broadcast')" id="btn-broadcast" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition">
                <i data-lucide="megaphone" class="w-5"></i> Broadcast
            </button>
        </nav>

        <button onclick="logout()" class="flex items-center gap-3 p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition">
            <i data-lucide="log-out" class="w-5"></i> Logout
        </button>
    </aside>

    <main class="flex-1 md:ml-64 p-6 md:p-10 space-y-8">

        <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 border-yellow-500">
    <div class="flex items-center gap-3">
        <i data-lucide="wrench" class="text-yellow-500 w-5"></i>
        <div>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Mode Perbaikan</p>
            <p id="maintStatusLabel" class="text-[10px] text-slate-500">Sistem berjalan normal</p>
        </div>
    </div>
    <button onclick="toggleMaintenance()" id="maintBtn" class="px-6 py-2 rounded-xl bg-slate-800 text-xs font-bold hover:bg-slate-700 transition">
        AKTIFKAN
    </button>
</div>
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h2 id="tabTitle" class="text-3xl font-bold">Overview</h2>
                <div id="botStatus" class="flex items-center gap-2 mt-1 text-sm text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                    <span id="statusText">Menghubungkan...</span>
                </div>
            </div>
            <div id="qrContainer" class="hidden glass p-3 rounded-2xl bg-white shadow-2xl shadow-green-500/10">
                <div id="qrArea"></div>
                <p class="text-[9px] text-slate-900 font-bold text-center mt-2">PINDAI WHATSAPP</p>
            </div>
        </div>

        <div id="tab-overview" class="tab-content tab-active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Users</p>
                    <h3 id="stat-total" class="text-4xl font-bold mt-2">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl border-l-4 border-green-500">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest text-green-400">User PRO</p>
                    <h3 id="stat-pro" class="text-4xl font-bold mt-2">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">System Health</p>
                    <h3 class="text-lg font-bold mt-2 text-green-400 flex items-center gap-2">Excellent <i data-lucide="check-circle" class="w-4"></i></h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <h4 class="text-sm font-bold text-slate-500 mb-6 uppercase">Traffic 7 Hari Terakhir</h4>
                    <canvas id="trafficChart" height="200"></canvas>
                </div>
                <div class="bg-black border border-slate-800 rounded-3xl flex flex-col overflow-hidden">
                    <div class="bg-slate-900 px-4 py-2 border-bottom border-slate-800 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-red-500"></div>
                        <span class="text-[10px] font-mono text-slate-500">live_activity.log</span>
                    </div>
                    <div id="logArea" class="p-4 flex-1 h-[250px] overflow-y-auto font-mono text-[11px] space-y-2">
                        <div class="text-slate-600">[SYSTEM] Menginisialisasi log terminal...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-users" class="tab-content">
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50 text-[10px] uppercase text-slate-500 font-bold">
                        <tr>
                            <th class="p-4">Nama Toko</th>
                            <th class="p-4">WhatsApp</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="userTable" class="text-sm"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const socket = io();
        lucide.createIcons();
        let isMaintenance = false;

        // 1. CHART SETUP
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                datasets: [{
                    label: 'Pesan Masuk',
                    data: [5, 12, 8, 15, 10, 20, 18],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true, tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });

        // 2. TAB LOGIC
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-slate-800', 'text-white'));
            
            document.getElementById('tab-' + tab).classList.add('tab-active');
            document.getElementById('btn-' + tab).classList.add('bg-slate-800', 'text-white');
            document.getElementById('tabTitle').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            if(tab === 'users') fetchUsers();
        }

        // 3. FETCH DATA
        async function fetchStats() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            document.getElementById('stat-total').innerText = data.stats.total;
            document.getElementById('stat-pro').innerText = data.stats.pro;
        }

        async function fetchUsers() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            document.getElementById('userTable').innerHTML = data.users.map(u => `
                <tr class="border-t border-slate-800/40 hover:bg-slate-800/20">
                    <td class="p-4 font-bold">${u.store_name}</td>
                    <td class="p-4 text-slate-400 font-mono">${u.id.split('@')[0]}</td>
                    <td class="p-4"><span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${u.status === 'pro' ? 'bg-green-500/20 text-green-400' : 'bg-slate-700 text-slate-400'}">${u.status}</span></td>
                    <td class="p-4"><button class="text-xs text-blue-400 hover:underline">Edit</button></td>
                </tr>
            `).join('');
        }

        // 4. REALTIME SOCKETS
        socket.on('bot_update', (data) => {
            document.getElementById('statusText').innerText = data.status;
            const indicator = document.querySelector('#botStatus span');
            if(data.status === 'Online') {
                indicator.className = "w-2 h-2 rounded-full bg-green-500";
                document.getElementById('qrContainer').classList.add('hidden');
            } else if(data.qr) {
                document.getElementById('qrContainer').classList.remove('hidden');
                document.getElementById('qrArea').innerHTML = `<img src="${data.qr}" class="w-32 h-32" />`;
            }
        });

        socket.on('new_log', (data) => {
            const area = document.getElementById('logArea');
            const item = document.createElement('div');
            item.innerHTML = `<span class="text-slate-500">${new Date().toLocaleTimeString()}</span> <span class="text-green-500">MSG_IN:</span> <span class="text-white">${data.body}</span>`;
            area.prepend(item); // Masukkan ke atas
        });

        

// Fungsi untuk mengambil status awal saat page load
async function loadMaintenanceStatus() {
    const res = await fetch('/api/admin/data');
    const data = await res.json();
    isMaintenance = data.stats.maintenance;
    updateMaintUI();
}

function updateMaintUI() {
    const btn = document.getElementById('maintBtn');
    const label = document.getElementById('maintStatusLabel');
    
    if (isMaintenance) {
        btn.innerHTML = "MATIKAN";
        btn.className = "px-6 py-2 rounded-xl bg-red-600 text-white text-xs font-bold hover:bg-red-500 transition";
        label.innerText = "Mode Perbaikan AKTIF (Pesan otomatis telah dikirim)";
    } else {
        btn.innerHTML = "AKTIFKAN";
        btn.className = "px-6 py-2 rounded-xl bg-slate-800 text-white text-xs font-bold hover:bg-slate-700 transition";
        label.innerText = "Sistem berjalan normal";
    }
}

async function toggleMaintenance() {
    const confirmMsg = isMaintenance 
        ? "Matikan mode perbaikan? User akan dikirimi pesan bahwa sistem sudah normal." 
        : "Aktifkan mode perbaikan? Bot akan mengirim pesan otomatis ke SEMUA user.";
        
    if (!confirm(confirmMsg)) return;

    const res = await fetch('/api/admin/toggle-maintenance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: !isMaintenance })
    });

    if (res.ok) {
        isMaintenance = !isMaintenance;
        updateMaintUI();
        alert("Status berhasil diperbarui!");
    }
}

// Panggil fungsi saat load
loadMaintenanceStatus();

        async function logout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin-login.html';
        }



        fetchStats();
    </script>
</body>
</html>
