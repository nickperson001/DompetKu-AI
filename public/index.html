<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - KawanCuan HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <div class="md:hidden glass p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-bold text-green-400">KawanCuan</h1>
        <button onclick="toggleMobileMenu()" class="p-2"><i data-lucide="menu"></i></button>
    </div>

    <aside id="sidebar" class="hidden md:flex flex-col w-full md:w-64 glass p-6 fixed h-full z-40 transition-all duration-300">
        <div class="mb-10 hidden md:block">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">KawanCuan</h1>
            <p class="text-[10px] tracking-widest text-slate-500 uppercase font-bold mt-1">Admin Control Center</p>
        </div>
        
        <nav class="space-y-3 flex-1">
            <button onclick="switchTab('overview')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition text-slate-300 hover:text-white" id="btn-overview">
                <i data-lucide="layout-dashboard" class="w-5"></i> Overview
            </button>
            <button onclick="switchTab('users')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition text-slate-300 hover:text-white" id="btn-users">
                <i data-lucide="users" class="w-5"></i> Database User
            </button>
            <button onclick="switchTab('broadcast')" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition text-slate-300 hover:text-white" id="btn-broadcast">
                <i data-lucide="megaphone" class="w-5"></i> Broadcast
            </button>
        </nav>

        <div class="pt-6 border-t border-slate-800 space-y-4">
            <div class="flex items-center justify-between text-sm p-2">
                <span class="text-slate-400">Maintenance</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="maintToggle" onchange="toggleMaint(this.checked)" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-red-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                </label>
            </div>
            <button onclick="logout()" class="w-full flex items-center gap-3 p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition">
                <i data-lucide="log-out" class="w-5"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 md:ml-64 p-4 md:p-8">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h2 id="activeTabName" class="text-2xl font-bold">Dashboard Overview</h2>
                <div id="botStatus" class="flex items-center gap-2 mt-1 text-sm">
                    <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                    <span id="statusText" class="text-slate-400">Menghubungkan Bot...</span>
                </div>
            </div>
            <div id="qrContainer" class="hidden glass p-3 rounded-2xl bg-white">
                <div id="qrArea"></div>
                <p class="text-[10px] text-slate-900 font-bold text-center mt-2">PINDAI QR CODE</p>
            </div>
        </div>

        <div id="tab-overview" class="tab-content tab-active space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Total Leads</p>
                    <h3 id="stat-total" class="text-4xl font-bold mt-2">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl border-l-4 border-green-500">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">User PRO</p>
                    <h3 id="stat-pro" class="text-4xl font-bold mt-2 text-green-400">0</h3>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-wider">Sesi Database</p>
                    <h3 class="text-xl font-bold mt-2 flex items-center gap-2">Terhubung <i data-lucide="check-circle" class="text-green-500 w-5"></i></h3>
                </div>
            </div>
            
            <div class="glass p-6 rounded-3xl h-[400px] flex flex-col">
                <h4 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="activity" class="text-green-400"></i> Live Activity Log</h4>
                <div id="logArea" class="flex-1 overflow-y-auto space-y-3 font-mono text-[11px] text-slate-400"></div>
            </div>
        </div>

        <div id="tab-users" class="tab-content space-y-4">
            <div class="glass rounded-3xl overflow-hidden overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                    <thead class="bg-slate-800/50 text-slate-500 text-[10px] font-bold uppercase">
                        <tr>
                            <th class="p-4">Identitas Toko</th>
                            <th class="p-4">Nomor WhatsApp</th>
                            <th class="p-4">Status Paket</th>
                            <th class="p-4 text-center">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="userList" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-broadcast" class="tab-content max-w-2xl mx-auto">
            <div class="glass p-8 rounded-3xl space-y-6">
                <h3 class="text-xl font-bold">📢 Kirim Pesan Massal</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Target Penerima</label>
                        <select id="bcTarget" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition">
                            <option value="all">Semua Leads (Demo & PRO)</option>
                            <option value="pro">Hanya User PRO & Unlimited</option>
                            <option value="demo">Hanya User Versi Demo</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Isi Pesan</label>
                        <textarea id="bcMsg" rows="6" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-green-500 transition placeholder-slate-600" placeholder="Halo Bos! Ada promo menarik hari ini..."></textarea>
                    </div>
                    <button onclick="runBroadcast()" id="bcBtn" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-bold transition-all shadow-lg shadow-green-900/30">
                        Mulai Broadcast
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const socket = io();

        // Navigasi Tab
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('tab-active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('bg-slate-800', 'text-white'));
            
            document.getElementById('tab-' + tabId).classList.add('tab-active');
            document.getElementById('btn-' + tabId).classList.add('bg-slate-800', 'text-white');
            document.getElementById('activeTabName').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
            
            if(tabId === 'users') fetchUsers();
            if(window.innerWidth < 768) toggleMobileMenu();
        }

        function toggleMobileMenu() {
            const side = document.getElementById('sidebar');
            side.classList.toggle('hidden');
        }

        // Fetch Data
        async function fetchStats() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            document.getElementById('stat-total').innerText = data.stats.total;
            document.getElementById('stat-pro').innerText = data.stats.pro;
            document.getElementById('maintToggle').checked = data.stats.maintenance;
        }

        async function fetchUsers() {
            const res = await fetch('/api/admin/data');
            const data = await res.json();
            const list = document.getElementById('userList');
            list.innerHTML = data.users.map(u => `
                <tr class="border-t border-slate-800/50 hover:bg-slate-800/30 transition">
                    <td class="p-4">
                        <div class="font-bold">${u.store_name}</div>
                        <div class="text-[10px] text-slate-500">Joined: ${new Date(u.created_at).toLocaleDateString()}</div>
                    </td>
                    <td class="p-4 font-mono text-xs">${u.id.split('@')[0]}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${u.status !== 'demo' ? 'bg-green-900/40 text-green-400' : 'bg-slate-700 text-slate-400'}">${u.status}</span>
                    </td>
                    <td class="p-4 text-center">
                        <select onchange="updateStatus('${u.id}', this.value)" class="bg-slate-800 text-xs p-2 rounded-lg border border-slate-700 outline-none">
                            <option value="demo" ${u.status === 'demo' ? 'selected' : ''}>Set Demo</option>
                            <option value="pro" ${u.status === 'pro' ? 'selected' : ''}>Set PRO</option>
                            <option value="unlimited" ${u.status === 'unlimited' ? 'selected' : ''}>Set Unlimited</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch('/api/admin/update-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: id, status })
            });
            fetchUsers();
        }

        async function toggleMaint(val) {
            await fetch('/api/admin/toggle-maintenance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ value: val })
            });
        }

        async function runBroadcast() {
            const msg = document.getElementById('bcMsg').value;
            const target = document.getElementById('bcTarget').value;
            const btn = document.getElementById('bcBtn');
            if(!msg) return alert("Pesan tidak boleh kosong!");

            btn.disabled = true; btn.innerText = "Mengirim...";
            await fetch('/api/admin/broadcast', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, target })
            });
            alert("Broadcast telah masuk antrian!");
            btn.disabled = false; btn.innerText = "Mulai Broadcast";
            document.getElementById('bcMsg').value = "";
        }

        async function logout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin-login.html';
        }

        // Realtime Updates
        socket.on('bot_update', (data) => {
            const statusText = document.getElementById('statusText');
            const botIndicator = document.querySelector('#botStatus span');
            const qrCont = document.getElementById('qrContainer');
            
            statusText.innerText = data.status;
            if(data.status === 'Online') {
                botIndicator.className = "w-2 h-2 rounded-full bg-green-500";
                qrCont.classList.add('hidden');
            } else {
                botIndicator.className = "w-2 h-2 rounded-full bg-red-500 animate-pulse";
                if(data.qr) {
                    qrCont.classList.remove('hidden');
                    document.getElementById('qrArea').innerHTML = `<img src="${data.qr}" class="w-32 h-32" />`;
                }
            }
        });

        socket.on('new_log', (data) => {
            const logArea = document.getElementById('logArea');
            const item = document.createElement('div');
            item.className = "flex gap-2 p-2 rounded hover:bg-slate-800/50";
            item.innerHTML = `<span class="text-green-500">[${new Date().toLocaleTimeString()}]</span> <span class="text-white">${data.from.split('@')[0]}:</span> ${data.body}`;
            logArea.prepend(item);
            fetchStats();
        });

        lucide.createIcons();
        fetchStats();
    </script>
</body>
</html>
